<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Infrastructure Search</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.30/"></script>
  <style>
    html, body, #viewDiv { margin: 0; height: 100%; width: 100%; }
    #panel {
      position: absolute; top: 12px; right: 12px; z-index: 99;
      background: #fff; padding: 12px; width: 320px; max-height: 90%;
      overflow: auto; font: 14px sans-serif;
      box-shadow: 0 1px 6px rgba(0,0,0,.3); border-radius: 6px;
    }
    #panel h3 { margin: 0 0 8px; }
    #panel h4 { margin: 12px 0 4px; }
    input { width: 90px; }
    button {
      margin-top: 8px; padding: 6px 12px; cursor: pointer;
      background: #0079c1; color: #fff; border: none; border-radius: 4px;
    }
    .hint { color: #666; font-size: 12px; }
    #details { margin-top: 12px; border-top: 1px solid #ddd; padding-top: 8px; }
    #details table { width: 100%; border-collapse: collapse; font-size: 12px; }
    #details td { padding: 2px 4px; vertical-align: top; border-bottom: 1px solid #f0f0f0; }
    #details td:first-child { width: 40%; color: #444; }
  </style>
</head>
<body>
  <div id="viewDiv"></div>
  <div id="panel">
    <h3>Infrastructure Search</h3>
    <div class="hint">Click the map to set a center point, then Search. Click any drawn feature to see its details.</div>
    <br>
    Radius (km): <input id="radius" type="number" value="10">
    <br>
    <button id="search">Search</button>
    <div id="results"></div>
    <div id="details"></div>
  </div>

  <script>
  // ============================================================
  const BACKEND = "http://localhost:5008";
  // ============================================================

  require([
    "esri/Map", "esri/views/MapView",
    "esri/Graphic", "esri/layers/GraphicsLayer",
    "esri/geometry/geometryEngine"
  ], (Map, MapView, Graphic, GraphicsLayer, geometryEngine) => {

    const gl = new GraphicsLayer();
    const view = new MapView({
      container: "viewDiv",
      map: new Map({ basemap: "topo-vector", layers: [gl] }),
      center: [-90.05, 29.95],  // New Orleans - levee country
      zoom: 11
    });

    let center = null;
    let centerGraphic = null;  // track the red dot separately so we don't wipe results

    //check if a drawn feature was clicked otherwise, treat the click as setting a new search center
    view.on("click", (e) => {
      view.hitTest(e).then((response) => {
        const hit = response.results.find(
          r => r.graphic && r.graphic.layer === gl && r.graphic.attributes
        );
        if (hit) {
          // Clicked an actual feature -> show its info, don't move the center.
          showDetails(hit.graphic.attributes);
        } else {
          // Clicked empty map -> set this as the new search center.
          center = e.mapPoint;
          if (centerGraphic) gl.remove(centerGraphic);
          centerGraphic = new Graphic({
            geometry: center,
            symbol: { type: "simple-marker", color: "red", size: 10 }
          });
          gl.add(centerGraphic);
        }
      });
    });

    document.getElementById("search").onclick = async () => {
      if (!center) { alert("Click the map first to set a center point."); return; }
    const radiusKm = +document.getElementById("radius").value;
    const radius = radiusKm * 1000;   // backend and buffer both want meters

      // Clear previous results.
      gl.removeAll();
      if (centerGraphic) gl.add(centerGraphic);
      document.getElementById("details").innerHTML = "";

      // Draw search radius as a circle.
      const buffer = geometryEngine.geodesicBuffer(center, radius, "meters");
      gl.add(new Graphic({
        geometry: buffer,
        symbol: {
          type: "simple-fill",
          color: [0, 120, 255, 0.1],
          outline: { color: [0, 120, 255], width: 1 }
        }
      }));

      const out = document.getElementById("results");
      out.innerHTML = "<i>Searching...</i>";

      try {
        const url = `${BACKEND}/infrastructure?lat=${center.latitude}` +
                    `&lon=${center.longitude}&radiusMeters=${radius}`;
        const data = await (await fetch(url)).json();

        out.innerHTML = "";
        for (const layer of data.layers) {
          const feats = (layer.geoJson && layer.geoJson.features) || [];
          out.innerHTML += `<h4>${layer.layerName} (${feats.length})</h4>`;
          feats.forEach(f => {
            const geom = jsonToEsri(f.geometry);
if (geom) gl.add(new Graphic({
  geometry: geom,
  symbol: symbolFor(f.geometry.type, layer.layerName),
  attributes: { _layer: layer.layerName, ...f.properties }
}));
          });
        }
        if (data.layers.length === 0) out.innerHTML = "<i>No results.</i>";
      } catch (err) {
        out.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
      }
    };

    // Render a clicked feature's attributes into the details panel.
    function showDetails(attrs) {
      const details = document.getElementById("details");
      let html = `<h4>${attrs._layer || "Feature"}</h4><table>`;
      for (const [key, value] of Object.entries(attrs)) {
        if (key === "_layer") continue;               
        if (value === null || value === "") continue; 
        html += `<tr><td>${key}</td><td>${value}</td></tr>`;
      }
      html += "</table>";
      details.innerHTML = html;
    }

    // Convert GeoJSON geometry into the shape the ArcGIS SDK draws.
    function jsonToEsri(g) {
      if (!g) return null;
      if (g.type === "Point")
        return { type: "point", longitude: g.coordinates[0], latitude: g.coordinates[1] };
      if (g.type === "LineString")
        return { type: "polyline", paths: [g.coordinates] };
      if (g.type === "MultiLineString")
        return { type: "polyline", paths: g.coordinates };
      if (g.type === "Polygon")
        return { type: "polygon", rings: g.coordinates };
      if (g.type === "MultiPolygon")
        return { type: "polygon", rings: g.coordinates.flat() };
      return null;
    }

    // color/style
    function symbolFor(geometryType, layerName) {
      const colors = {
        "Leveed Areas": [255, 140, 0],   // orange
        "Pump Stations": [0, 180, 80],   // green
        "Dams": [200, 30, 30]            // red
      };
      const color = colors[layerName] || [120, 120, 120];  // grey fallback
 
      if (geometryType === "Point")
        return { type: "simple-marker", color: color, size: 9,
                 outline: { color: [255, 255, 255], width: 1 } };
      if (geometryType === "LineString" || geometryType === "MultiLineString")
        return { type: "simple-line", color: color, width: 3 };
      return {
        type: "simple-fill",
        color: [...color, 0.3],          // same color, translucent fill
        outline: { color: color, width: 1 }
      };
    }
  });
  </script>
</body>
</html>
